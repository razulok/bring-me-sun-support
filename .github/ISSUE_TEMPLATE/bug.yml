name: Problem melden / Report a problem
description: Melde ein reproduzierbares Problem in Bring Me Sun.
title: "[Bug]: "
labels: ["external", "bug"]
body:
  - type: markdown
    attributes:
      value: |
        Danke für die Meldung. Bitte keine personenbezogenen, vertraulichen oder sicherheitsrelevanten Daten veröffentlichen.
  - type: dropdown
    id: surface
    attributes:
      label: Bereich / Surface
      options:
        - Web-App
        - Landingpage
        - Installierte App
        - Andere / Other
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: Was ist passiert? / What happened?
      description: Beschreibe das sichtbare Problem ohne private Daten.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Erwartetes Verhalten / Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Schritte / Steps to reproduce
      placeholder: "1. ...\n2. ...\n3. ..."
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser und Version / Browser and version
  - type: checkboxes
    id: privacy
    attributes:
      label: Datenschutz / Privacy
      options:
        - label: Ich habe keine personenbezogenen, vertraulichen oder sicherheitsrelevanten Daten eingefügt.
          required: true